<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Builder - 城建設シミュレーション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .castle-bg { transition: background 1s ease; }
        .tab-button.active { border-bottom: 2px solid #fbbf24; color: #fbbf24; }
        .resource-card { cursor: pointer; transition: transform 0.1s; }
        .resource-card:active { transform: scale(0.95); }
        .progress-bar { transition: width 0.3s; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <!-- Header / Background Display -->
        <header id="game-bg" class="castle-bg h-48 flex items-center justify-center p-4 border-b-4 border-slate-700 bg-gradient-to-b from-sky-800 to-slate-900">
            <h1 class="text-3xl font-bold drop-shadow-lg" id="castle-name">新米の城塞</h1>
        </header>

        <!-- Stats Bar -->
        <div class="bg-slate-800 p-2 text-xs flex flex-wrap gap-2 justify-center border-b border-slate-700">
            <span class="text-yellow-400">金: <span id="stat-gold">0</span></span>
            <span class="text-blue-400">水: <span id="stat-water">0</span></span>
            <span class="text-gray-400">鉄: <span id="stat-iron">0</span></span>
        </div>

        <!-- Tab Navigation -->
        <nav class="flex justify-around bg-slate-900 p-2 border-b border-slate-800">
            <button onclick="showTab('mine')" class="tab-button p-2 text-sm active" id="btn-mine">採掘</button>
            <button onclick="showTab('build')" class="tab-button p-2 text-sm" id="btn-build">建築</button>
            <button onclick="showTab('craft')" class="tab-button p-2 text-sm" id="btn-craft">工房</button>
            <button onclick="showTab('goal')" class="tab-button p-2 text-sm" id="btn-goal">目標</button>
        </nav>

        <!-- Main Content Area -->
        <main class="flex-grow p-4 overflow-y-auto" id="content">
            <!-- Dynamic content loaded via JS -->
        </main>
    </div>

    <script>
        const state = {
            resources: {
                water: 0, grass: 0, wood: 0, stone: 0, copper: 0, iron: 0, silver: 0, gold: 0, titanium: 0
            },
            buildings: [],
            excavators: 0,
            level: 1,
            stats: { totalMined: 0 }
        };

        const recipes = {
            '水堀': { water: 10 },
            '草の壁': { grass: 10 },
            '木の壁': { wood: 10 },
            '石の壁': { stone: 20 },
            '銅の監視塔': { copper: 30 },
            '鉄の砲兵': { iron: 50 },
            '金の装飾棟': { gold: 100 },
            '未来の防衛棟': { titanium: 200 }
        };

        function mine(type) {
            state.resources[type]++;
            state.stats.totalMined++;
            render();
        }

        function gameLoop() {
            if (state.excavators > 0) {
                // 自動採掘 (ランダムな資源)
                const types = Object.keys(state.resources);
                const randomType = types[Math.floor(Math.random() * types.length)];
                state.resources[randomType] += state.excavators;
                render();
            }
        }
        setInterval(gameLoop, 2000);

        function showTab(tab) {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');
            const content = document.getElementById('content');
            
            if (tab === 'mine') {
                content.innerHTML = `
                    <h2 class="text-xl mb-4">資源をタップして採掘</h2>
                    <div class="grid grid-cols-3 gap-2">
                        ${Object.keys(state.resources).map(r => `
                            <button onclick="mine('${r}')" class="bg-slate-700 p-4 rounded-lg resource-card hover:bg-slate-600 border border-slate-500">
                                <div class="text-2xl mb-1">${r === 'water' ? '💧' : r === 'wood' ? '🪵' : '⛏️'}</div>
                                <div class="text-xs uppercase">${r}</div>
                                <div class="font-bold">${state.resources[r]}</div>
                            </button>
                        `).join('')}
                    </div>
                `;
            } else if (tab === 'build') {
                content.innerHTML = `
                    <h2 class="text-xl mb-4">建築メニュー</h2>
                    <div class="space-y-2">
                        ${Object.keys(recipes).map(b => `
                            <div class="bg-slate-800 p-3 rounded flex justify-between items-center border border-slate-700">
                                <div>
                                    <div class="font-bold">${b}</div>
                                    <div class="text-xs text-slate-400">${Object.entries(recipes[b]).map(([k,v]) => `${k}:${v}`).join(', ')}</div>
                                </div>
                                <button onclick="build('${b}')" class="bg-amber-600 px-4 py-2 rounded font-bold hover:bg-amber-500">建築</button>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (tab === 'craft') {
                content.innerHTML = `
                    <h2 class="text-xl mb-4">工房 (自動化)</h2>
                    <div class="bg-slate-800 p-4 rounded text-center">
                        <p class="mb-4">掘削機: ${state.excavators}台 稼働中</p>
                        <button onclick="craftExcavator()" class="bg-emerald-600 px-6 py-3 rounded-full font-bold hover:bg-emerald-500 w-full">
                            掘削機を作成 (石材x50, 鉄x20)
                        </button>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <h2 class="text-xl mb-4">目標コンプリート</h2>
                    <div class="text-sm opacity-80">
                        <p>・100個採掘する (${state.stats.totalMined}/100)</p>
                        <p>・建物を5つ建てる (${state.buildings.length}/5)</p>
                    </div>
                `;
            }
        }

        function build(name) {
            const req = recipes[name];
            for (let [res, amt] of Object.entries(req)) {
                if (state.resources[res] < amt) return alert('材料が足りません！');
            }
            for (let [res, amt] of Object.entries(req)) state.resources[res] -= amt;
            state.buildings.push(name);
            updateVisuals();
            render();
        }

        function craftExcavator() {
            if (state.resources.stone >= 50 && state.resources.iron >= 20) {
                state.resources.stone -= 50;
                state.resources.iron -= 20;
                state.excavators++;
                render();
            } else {
                alert('材料不足です');
            }
        }

        function updateVisuals() {
            const bg = document.getElementById('game-bg');
            if (state.buildings.length > 5) {
                bg.className = "castle-bg h-48 flex items-center justify-center p-4 border-b-4 border-amber-800 bg-gradient-to-b from-amber-700 to-slate-900";
                document.getElementById('castle-name').innerText = "要塞都市";
            }
        }

        function render() {
            document.getElementById('stat-gold').innerText = state.resources.gold;
            document.getElementById('stat-water').innerText = state.resources.water;
            document.getElementById('stat-iron').innerText = state.resources.iron;
            // リフレッシュを避けるため、現在のタブを保持したままデータだけ更新する簡易版
            const activeTab = document.querySelector('.tab-button.active').innerText;
            if(activeTab === '採掘') showTab('mine');
        }

        // 初期表示
        showTab('mine');
    </script>
</body>
</html>
