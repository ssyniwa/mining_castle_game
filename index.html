<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Builder</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; text-align: center; margin: 0; padding: 10px; }
        #game-view { background: #34495e; padding: 20px; border-radius: 10px; min-height: 300px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        button { padding: 15px; border: none; border-radius: 5px; cursor: pointer; background: #3498db; color: white; }
        #stats { font-size: 1.2em; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="stats">
        資金: <span id="gold">0</span> | 材料: <span id="materials">0</span>
    </div>

    <div id="game-view">
        <h2 id="castle-status">未開の地</h2>
        <div id="display" style="font-size: 50px;">🏰</div>
        <div class="grid">
            <button onclick="mine()">採掘する</button>
            <button onclick="build()">建築する</button>
            <button onclick="upgrade()">目標達成</button>
        </div>
    </div>

    <script>
        let state = { money: 0, materials: 0, level: 0 };
        
        function mine() {
            state.materials += 1;
            updateUI();
        }

        function build() {
            if (state.materials >= 10) {
                state.materials -= 10;
                state.money += 5;
                alert("壁を建築しました！");
                updateUI();
            } else {
                alert("材料が足りません！");
            }
        }

        function upgrade() {
            if (state.money >= 50) {
                state.money -= 50;
                state.level++;
                document.getElementById('castle-status').innerText = "レベル " + state.level + " の城";
                alert("城が豪華になりました！");
            }
        }

        function updateUI() {
            document.getElementById('gold').innerText = state.money;
            document.getElementById('materials').innerText = state.materials;
        }

        // 放置収益（掘削機）
        setInterval(() => {
            state.materials += 1;
            updateUI();
        }, 5000);
    </script>
</body>
</html>
