<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mining Castle Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-neutral: #fdfbf7; --card-bg: rgba(255, 255, 255, 0.85); }
        body { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; background-color: var(--bg-neutral); transition: background 1.5s ease, color 1.5s ease; -webkit-tap-highlight-color: transparent; }
        .bg-step-0 { background: #fdfbf7; color: #1a202c; }
        .bg-step-1 { background: #ecfdf5; color: #064e3b; }
        .bg-step-2 { background: #f1f5f9; color: #1e293b; }
        .bg-step-3 { background: #fffbeb; color: #451a03; }
        .bg-step-4 { background: #0f172a; color: #f8fafc; }
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); border-radius: 1.25rem; }
        .bg-step-4 .glass-panel { background: rgba(30, 41, 59, 0.8); border-color: rgba(255, 255, 255, 0.1); }
        .mine-btn { transition: all 0.1s; touch-action: manipulation; }
        .mine-btn:active { transform: scale(0.92); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-step-0 min-h-screen pb-24">

    <div class="max-w-md mx-auto p-4 space-y-6">
        <header class="text-center pt-4">
            <h1 id="rank-title" class="text-xs font-bold tracking-widest uppercase opacity-70 mb-1">新米開拓者</h1>
            <h2 id="castle-name" class="text-3xl font-extrabold tracking-tight">荒野の拠点</h2>
            <div class="flex justify-center items-center mt-2 space-x-2">
                <span id="level-badge" class="px-3 py-1 bg-amber-500 text-white text-xs font-bold rounded-full">Lv.0</span>
                <span id="auto-status" class="text-[10px] uppercase font-bold opacity-60">自動採掘: 停止中</span>
            </div>
            <!-- 城の視覚表現 -->
            <div id="castle-art" class="text-7xl my-6 transition-all duration-1000 transform scale-100 hover:scale-105">🏚️</div>
        </header>

        <section class="glass-panel p-5">
            <div class="h-48"><canvas id="statChart"></canvas></div>
        </section>

        <section class="space-y-3">
            <h3 class="text-sm font-bold uppercase tracking-wider px-1">採掘場</h3>
            <div id="resource-grid" class="grid grid-cols-3 gap-3"></div>
        </section>

        <section class="glass-panel p-5">
            <div class="flex border-b border-gray-200 mb-4 overflow-x-auto custom-scroll">
                <button onclick="switchTab('build')" id="tab-build" class="pb-2 px-4 text-sm font-bold border-b-2 border-amber-500">建設・防衛</button>
                <button onclick="switchTab('machine')" id="tab-machine" class="pb-2 px-4 text-sm font-bold border-b-2 border-transparent opacity-50">技術・自動化</button>
            </div>
            <div id="action-list" class="space-y-3 max-h-80 overflow-y-auto pr-2 custom-scroll"></div>
        </section>

        <section class="glass-panel p-5">
            <h3 class="text-xs font-bold uppercase mb-3 tracking-widest">進化のロードマップ</h3>
            <div id="achievement-log" class="space-y-2"></div>
        </section>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 glass-panel m-4 p-4 flex justify-around items-center border-t border-white/20 z-50">
        <div class="text-center"><p class="text-[10px] uppercase opacity-60">総資源</p><p id="total-res" class="text-lg font-bold">0</p></div>
        <div class="h-8 w-[1px] bg-gray-300"></div>
        <div class="text-center"><p class="text-[10px] uppercase opacity-60">防衛</p><p id="def-score" class="text-lg font-bold">0</p></div>
    </nav>

    <script>
        const state = {
            res: { 水: 0, 草: 0, 木材: 0, 石材: 0, 銅鉱石: 0, 鉄鉱石: 0, 銀鉱石: 0, 金鉱石: 0, チタン鉱石: 0 },
            owned: {}, stats: { defense: 0, production: 0, culture: 0 },
            autoMiningPower: 0, level: 0, currentTab: 'build'
        };

        const visuals = ["🏚️", "🏰", "🏯", "✨", "🛸"];
        const craftLibrary = {
            build: [
                { id: 'moat', name: '水堀', cost: { '水': 15 }, d: 10, p: 0, c: 5, info: '水の防壁' },
                { id: 'grass_wall', name: '草の壁', cost: { '草': 20 }, d: 5, p: 0, c: 10, info: '自然の目隠し' },
                { id: 'stone_wall', name: '石の壁', cost: { '石材': 50 }, d: 50, p: 0, c: 5, info: '鉄壁の守り' },
                { id: 'titan_tower', name: '未来の防衛棟', cost: { 'チタン鉱石': 500 }, d: 2500, p: 50, c: 1000, info: '超技術' }
            ],
            machine: [
                { id: 'drill_1', name: '手動掘削機', cost: { '石材': 50 }, power: 1, info: '自動採掘' },
                { id: 'drill_3', name: '未来の自動鉱山', cost: { 'チタン鉱石': 200 }, power: 30, info: '全自動化' }
            ]
        };

        let statChart;
        function init() {
            const ctx = document.getElementById('statChart').getContext('2d');
            statChart = new Chart(ctx, { type: 'radar', data: { labels: ['防御力', '生産力', '文化度'], datasets: [{ data: [0,0,0], backgroundColor: 'rgba(245, 158, 11, 0.2)', borderColor: '#f59e0b', borderWidth: 2 }] }, options: { scales: { r: { beginAtZero: true } }, plugins: { legend: { display: false } } } });
            
            const grid = document.getElementById('resource-grid');
            Object.keys(state.res).forEach(name => {
                const btn = document.createElement('button');
                btn.onclick = () => { state.res[name]++; updateUI(); };
                btn.className = "mine-btn bg-white/50 p-3 rounded-xl border-b-4 border-slate-200 shadow-sm";
                btn.innerHTML = `<p class="text-[10px] font-bold">${name}</p><p id="res-${name}" class="text-lg font-black">0</p>`;
                grid.appendChild(btn);
            });
            updateUI();
        }

        function updateUI() {
            document.getElementById('total-res').innerText = Object.values(state.res).reduce((a, b) => a + b, 0).toLocaleString();
            document.getElementById('def-score').innerText = state.stats.defense.toLocaleString();
            Object.keys(state.res).forEach(k => { const el = document.getElementById(`res-${k}`); if(el) el.innerText = state.res[k]; });
            
            statChart.data.datasets[0].data = [state.stats.defense, state.stats.production, state.stats.culture];
            statChart.update();
            renderCraftItems();
            checkProgression();
        }

        function craft(id, tab) {
            const item = craftLibrary[tab].find(x => x.id === id);
            for(let [r, a] of Object.entries(item.cost)) if(state.res[r] < a) return;
            for(let [r, a] of Object.entries(item.cost)) state.res[r] -= a;
            state.owned[id] = (state.owned[id] || 0) + 1;
            if(tab === 'build') { state.stats.defense += item.d; state.stats.production += item.p; state.stats.culture += item.c; }
            else { state.autoMiningPower += item.power; document.getElementById('auto-status').innerText = `自動採掘: ${state.autoMiningPower}/秒`; }
            updateUI();
        }

        function checkProgression() {
            const score = state.stats.defense + state.stats.culture;
            const newLevel = score > 5000 ? 4 : score > 1500 ? 3 : score > 300 ? 2 : score > 50 ? 1 : 0;
            if(state.level !== newLevel) {
                state.level = newLevel;
                document.body.className = `bg-step-${newLevel} min-h-screen pb-24`;
                document.getElementById('castle-art').innerText = visuals[newLevel];
                updateAchievementLog();
            }
        }

        function updateAchievementLog() {
            const logs = [
                { text: "草原へ", check: () => state.owned.moat >= 3 },
                { text: "石の要塞", check: () => state.stats.defense >= 300 },
                { text: "黄金の繁栄", check: () => state.stats.culture >= 1500 }
            ];
            document.getElementById('achievement-log').innerHTML = logs.map(l => 
                `<div class="text-xs font-bold ${l.check()?'text-green-600':'text-gray-400'}">${l.check()?'●':'○'} ${l.text}</div>`).join('');
        }

        function renderCraftItems() {
            const list = document.getElementById('action-list');
            list.innerHTML = craftLibrary[state.currentTab].map(item => `
                <button onclick="craft('${item.id}', '${state.currentTab}')" class="w-full text-left p-3 rounded-lg border bg-white/50 border-white/20">
                    <div class="flex justify-between font-bold text-sm"><span>${item.name}</span><span class="opacity-50">所持:${state.owned[item.id]||0}</span></div>
                    <div class="text-[10px] font-mono">${Object.entries(item.cost).map(([r,a])=>`${r}:${a}`).join(' ')}</div>
                </button>
            `).join('');
        }

        function switchTab(t) {
            state.currentTab = t;
            renderCraftItems();
        }

        init();
        setInterval(() => { if(state.autoMiningPower > 0) { state.res['石材'] += state.autoMiningPower; updateUI(); } }, 1000);
    </script>
</body>
</html>
