<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mining Castle Defense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1e293b; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto space-y-6">
        <header class="text-center">
            <h1 class="text-2xl font-bold text-amber-400">🛡️ マイニング・キャッスル防衛戦</h1>
            <p id="castle-status" class="text-sm text-slate-400">現在の背景: 荒野</p>
        </header>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-4 rounded-xl">
                <p class="text-xs text-slate-400">材料</p>
                <div id="resources" class="text-lg font-mono">石材: 0</div>
            </div>
            <div class="glass p-4 rounded-xl">
                <p class="text-xs text-slate-400">戦力</p>
                <div id="defenses" class="text-lg font-mono">部隊: 0</div>
            </div>
        </div>

        <section class="glass p-4 rounded-xl">
            <h2 class="text-sm font-bold mb-2">⛏️ 採掘 (クリックで入手)</h2>
            <div id="mine-buttons" class="grid grid-cols-3 gap-2"></div>
        </section>

        <section class="glass p-4 rounded-xl">
            <h2 class="text-sm font-bold mb-2">🏗️ 建築・防衛編成</h2>
            <div id="craft-buttons" class="grid grid-cols-1 gap-2"></div>
        </section>
    </div>

    <script>
        const state = {
            res: { 水:0, 草:0, 木材:0, 石材:0, 銅鉱石:0, 鉄鉱石:0, 銀鉱石:0, 金鉱石:0, チタン鉱石:0 },
            buildings: [],
            miners: 0
        };

        const recipes = {
            "水堀": { cost: { 水: 10 }, effect: "防衛" },
            "木の壁": { cost: { 木材: 20 }, effect: "防衛" },
            "銅の弓兵": { cost: { 銅鉱石: 50 }, effect: "防衛部隊" },
            "鉄の砲兵": { cost: { 鉄鉱石: 100 }, effect: "防衛部隊" },
            "放置掘削機": { cost: { 石材: 100, 鉄鉱石: 50 }, effect: "自動生産" }
        };

        function updateUI() {
            document.getElementById('resources').innerHTML = Object.entries(state.res)
                .map(([k, v]) => `${k}:${v}`).join(' ');
        }

        // 放置収益
        setInterval(() => {
            state.res.石材 += state.miners;
            updateUI();
        }, 1000);

        // 初期化
        const mineGrid = document.getElementById('mine-buttons');
        Object.keys(state.res).forEach(type => {
            const btn = document.createElement('button');
            btn.className = "bg-slate-700 p-2 rounded text-xs hover:bg-slate-600";
            btn.innerText = type;
            btn.onclick = () => { state.res[type]++; updateUI(); };
            mineGrid.appendChild(btn);
        });

        updateUI();
    </script>
</body>
</html>
