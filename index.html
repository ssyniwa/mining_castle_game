<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Architect Idle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .resource-card:active { transform: scale(0.95); }
        .grid-cell { aspect-ratio: 1 / 1; }
        .selected { border: 2px solid #f59e0b; }
    </style>
</head>
<body class="bg-zinc-900 text-zinc-100 min-h-screen flex flex-col">

    <header class="p-4 border-b border-zinc-700 bg-zinc-800 sticky top-0 z-10">
        <h1 class="text-xl font-bold mb-2">🏰 Castle Architect</h1>
        <div class="grid grid-cols-5 gap-1 text-[10px]" id="stats-bar">
            <!-- Stats inserted by JS -->
        </div>
    </header>

    <nav class="flex justify-around p-2 bg-zinc-800 border-b border-zinc-700">
        <button onclick="showTab('mine')" class="tab-btn active" id="tab-mine">⛏️ 採掘</button>
        <button onclick="showTab('build')" class="tab-btn" id="tab-build">🏗️ 建築</button>
        <button onclick="showTab('castle')" class="tab-btn" id="tab-castle">🏰 城</button>
        <button onclick="showTab('goals')" class="tab-btn" id="tab-goals">🏆 目標</button>
    </nav>

    <main class="flex-1 p-4 overflow-y-auto">
        <div id="view-mine" class="space-y-4"></div>
        <div id="view-build" class="space-y-4 hidden"></div>
        
        <div id="view-castle" class="hidden text-center space-y-4">
            <div id="castle-status" class="bg-zinc-800 p-2 rounded text-sm font-bold">建設ランク: 0 / 4</div>
            
            <!-- Grid Layout -->
            <div id="castle-grid" class="grid grid-cols-5 gap-1 bg-zinc-800 p-2 rounded-lg border border-zinc-700">
                <!-- Grid Cells inserted by JS -->
            </div>

            <!-- Inventory for Placement -->
            <div class="text-left">
                <h3 class="text-sm text-zinc-400 mb-2">所有資材 (クリックして選択):</h3>
                <div id="castle-inventory" class="grid grid-cols-4 gap-2"></div>
            </div>
        </div>

        <div id="view-goals" class="hidden space-y-4"></div>
    </main>

    <script>
        const state = {
            resources: { water: 0, grass: 0, wood: 0, stone: 0, copper: 0, iron: 0, silver: 0, gold: 0, titanium: 0 },
            inventory: {}, // Crafted but not placed
            map: Array(25).fill(null), // 5x5 grid
            selectedBuilding: null,
            excavators: 0
        };

        const config = {
            resources: {
                water: { name: "水", icon: "💧" },
                grass: { name: "草", icon: "🌱" },
                wood: { name: "木材", icon: "🪵" },
                stone: { name: "石材", icon: "🪨" },
                copper: { name: "銅", icon: "🟧" },
                iron: { name: "鉄", icon: "🟫" },
                silver: { name: "銀", icon: "🥈" },
                gold: { name: "金", icon: "🥇" },
                titanium: { name: "チタン", icon: "💎" }
            },
            buildings: {
                excavator: { name: "掘削機", cost: { wood: 50, stone: 50 }, img: "https://placehold.co/64x64/333/fff?text=⚙️" },
                water_moat: { name: "水堀", cost: { water: 100 }, img: "https://placehold.co/64x64/00f/fff?text=🌊" },
                grass_wall: { name: "草の壁", cost: { grass: 50 }, img: "https://placehold.co/64x64/0a0/fff?text=🌿" },
                wood_wall: { name: "木の壁", cost: { wood: 50 }, img: "https://placehold.co/64x64/8b4513/fff?text=🧱" },
                wood_tower: { name: "監視やぐら", cost: { wood: 100,grass:100 }, img: "https://placehold.co/64x64/444/fff?text=🗼" },
                torch: { name: "松明", cost: { wood: 10, stone: 5 }, img: "https://placehold.co/64x64/f97316/fff?text=🔥" },
                stone_wall: { name: "石の壁", cost: { stone: 100 }, img: "https://placehold.co/64x64/555/fff?text=⛰️" },
                stone_tower: { name: "石の監視塔", cost: { stone: 200 }, img: "https://placehold.co/64x64/444/fff?text=🗼" },
                copper_wall: { name: "銅の壁", cost: { copper: 100 }, img: "https://placehold.co/64x64/d97706/fff?text=🔶" },
                copper_tower: { name: "銅の監視棟", cost: { copper: 150 }, img: "https://placehold.co/64x64/d97706/fff?text=🔶" },
                iron_wall: { name: "鉄の壁", cost: { iron: 100 }, img: "https://placehold.co/64x64/d97706/fff?text=🔶" },
                iron_tower: { name: "鉄の監視棟", cost: { iron: 150 }, img: "https://placehold.co/64x64/d97706/fff?text=🔶" },
                silver_tower: { name: "銀の装飾棟", cost: { iron50,silver: 150 }, img: "https://placehold.co/64x64/d97706/fff?text=🔶" },
                gold_tower: { name: "金の装飾棟", cost: { iron:50,gold: 150 }, img: "https://placehold.co/64x64/d97706/fff?text=🔶" },
                stone_artillery: { name: "石弓兵", cost: { wood: 100, stone: 50 }, img: "https://placehold.co/64x64/dc2626/fff?text=💣" },
                copper_artillery: { name: "銅弓兵", cost: { copper: 100 }, img: "https://placehold.co/64x64/dc2626/fff?text=💣" },
                iron_artillery: { name: "鉄弓兵", cost: { iron: 100 }, img: "https://placehold.co/64x64/dc2626/fff?text=💣" },
                iron2_artillery: { name: "剣兵", cost: { iron: 200 }, img: "https://placehold.co/64x64/dc2626/fff?text=💣" },
                iron3_artillery: { name: "銃兵", cost: { iron: 300,titanium:100 }, img: "https://placehold.co/64x64/dc2626/fff?text=💣" },
                iron4_artillery: { name: "砲兵", cost: { iron: 500 }, img: "https://placehold.co/64x64/dc2626/fff?text=💣" },
                titanium_tower: { name: "未来防衛塔", cost: { iron:50,gold,50,titanium: 500 }, img: "https://placehold.co/64x64/7e22ce/fff?text=🚀" }
            },
            goals: [
                { desc: "水堀を配置", check: () => state.map.includes('water_moat'), bg: "bg-blue-900" },
                { desc: "防衛線を構築", check: () => state.map.filter(x => x === 'wood_wall').length > 2, bg: "bg-green-900" },
                { desc: "火力を配置", check: () => state.map.includes('stone_artillery'), bg: "bg-red-900" },
                { desc: "未来技術の配置", check: () => state.map.includes('titanium_tower'), bg: "bg-purple-900" }
            ]
        };

        function mine(type) {
            state.resources[type] += 1;
            render();
        }

        function craft(id) {
            const b = config.buildings[id];
            for (let res in b.cost) {
                if (state.resources[res] < b.cost[res]) return; // Silent return
            }
            for (let res in b.cost) state.resources[res] -= b.cost[res];
            state.inventory[id] = (state.inventory[id] || 0) + 1;
            render();
        }

        function selectForPlacement(id) {
            state.selectedBuilding = id;
            render();
        }

        function placeOnMap(index) {
            if (!state.selectedBuilding) return;
            if (state.inventory[state.selectedBuilding] > 0) {
                state.map[index] = state.selectedBuilding;
                state.inventory[state.selectedBuilding]--;
                state.selectedBuilding = null;
                render();
            }
        }

        function render() {
            // Stats
            document.getElementById('stats-bar').innerHTML = Object.keys(state.resources).map(k => `
                <div class="bg-zinc-700 p-1 rounded text-center">
                    <div>${config.resources[k].icon}</div>
                    <div class="font-bold">${state.resources[k]}</div>
                </div>
            `).join('');

            // Mine
            document.getElementById('view-mine').innerHTML = `
                <div class="grid grid-cols-3 gap-2">
                    ${Object.keys(config.resources).map(k => `
                        <button onclick="mine('${k}')" class="resource-card p-3 bg-zinc-800 rounded-lg border border-zinc-600">
                            ${config.resources[k].icon} ${config.resources[k].name}
                        </button>
                    `).join('')}
                </div>
            `;

            // Build
            document.getElementById('view-build').innerHTML = Object.keys(config.buildings).map(k => {
                const b = config.buildings[k];
                return `
                    <div class="p-3 bg-zinc-800 rounded-lg flex justify-between items-center border border-zinc-700">
                        <img src="${b.img}" class="w-10 h-10 rounded">
                        <div class="text-sm font-bold">${b.name}</div>
                        <button onclick="craft('${k}')" class="bg-blue-600 px-3 py-1 rounded text-xs">建築</button>
                    </div>
                `;
            }).join('');

            // Castle
            const grid = document.getElementById('castle-grid');
            grid.innerHTML = state.map.map((b, i) => `
                <div onclick="placeOnMap(${i})" class="grid-cell bg-zinc-900 border border-zinc-700 rounded flex items-center justify-center cursor-pointer">
                    ${b ? `<img src="${config.buildings[b].img}" class="w-full h-full p-1">` : ''}
                </div>
            `).join('');

            const inv = document.getElementById('castle-inventory');
            inv.innerHTML = Object.keys(state.inventory).filter(k => state.inventory[k] > 0).map(k => `
                <button onclick="selectForPlacement('${k}')" class="p-1 bg-zinc-800 rounded border ${state.selectedBuilding === k ? 'border-amber-500' : 'border-zinc-700'}">
                    <img src="${config.buildings[k].img}" class="w-full">
                    <div class="text-[10px]">x${state.inventory[k]}</div>
                </button>
            `).join('');

            // Goals
            document.getElementById('view-goals').innerHTML = config.goals.map((g, i) => `
                <div class="p-4 rounded-xl ${g.check() ? 'bg-emerald-900' : 'bg-zinc-800'} border border-zinc-700 text-sm">
                    ${g.desc} ${g.check() ? '✅' : '⏳'}
                </div>
            `).join('');
            
            let tier = config.goals.filter(g => g.check()).length;
            document.getElementById('castle-status').innerText = `建設ランク: ${tier} / ${config.goals.length}`;
        }

        function showTab(id) {
            document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + id).classList.remove('hidden');
            document.getElementById('tab-' + id).classList.add('active');
        }

        setInterval(() => {
            state.excavators = state.inventory.excavator || 0;
            if (state.excavators > 0) {
                Object.keys(state.resources).forEach(r => state.resources[r] += state.excavators);
                render();
            }
        }, 3000);

        window.onload = render;
    </script>
</body>
</html>
