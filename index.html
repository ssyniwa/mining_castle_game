<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Architect Idle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .resource-card { transition: transform 0.1s; }
        .resource-card:active { transform: scale(0.95); }
        .castle-bg { transition: background 0.5s ease; }
    </style>
</head>
<body class="bg-zinc-900 text-zinc-100 min-h-screen flex flex-col">

    <header class="p-4 border-b border-zinc-700 bg-zinc-800 sticky top-0 z-10">
        <h1 class="text-xl font-bold mb-2">🏰 Castle Architect</h1>
        <div class="grid grid-cols-3 gap-2 text-xs" id="stats-bar">
            <!-- Stats inserted by JS -->
        </div>
    </header>

    <nav class="flex justify-around p-2 bg-zinc-800 border-b border-zinc-700">
        <button onclick="showTab('mine')" class="tab-btn active" id="tab-mine">⛏️ 採掘</button>
        <button onclick="showTab('build')" class="tab-btn" id="tab-build">🏗️ 建築</button>
        <button onclick="showTab('castle')" class="tab-btn" id="tab-castle">🏰 城</button>
        <button onclick="showTab('goals')" class="tab-btn" id="tab-goals">🏆 目標</button>
    </nav>

    <main class="flex-1 p-4 overflow-y-auto">
        <div id="view-mine" class="space-y-4"></div>
        <div id="view-build" class="space-y-4 hidden"></div>
        <div id="view-castle" class="hidden text-center">
            <div id="castle-display" class="w-full h-64 border-4 border-zinc-700 rounded-2xl flex flex-col items-center justify-center p-4 castle-bg">
                <h2 class="text-4xl">🏯</h2>
                <p id="castle-status" class="mt-4 font-bold">建設レベル: 初級</p>
            </div>
            <div id="castle-inventory" class="mt-4 grid grid-cols-2 gap-2"></div>
        </div>
        <div id="view-goals" class="hidden space-y-4"></div>
    </main>

    <script>
        const state = {
            resources: { water: 0, grass: 0, wood: 0, stone: 0, copper: 0, iron: 0, silver: 0, gold: 0, titanium: 0 },
            buildings: {},
            excavators: 0,
            goalTier: 0,
            lastTick: Date.now()
        };

        const config = {
            resources: {
                water: { name: "水", icon: "💧" },
                grass: { name: "草", icon: "🌱" },
                wood: { name: "木材", icon: "🪵" },
                stone: { name: "石材", icon: "🪨" },
                copper: { name: "銅鉱石", icon: "🟧" },
                iron: { name: "鉄鉱石", icon: "🟫" },
                silver: { name: "銀鉱石", icon: "🥈" },
                gold: { name: "金鉱石", icon: "🥇" },
                titanium: { name: "チタン", icon: "💎" }
            },
            buildings: {
                excavator: { name: "自動掘削機", cost: { wood: 50, stone: 50, iron: 20 }, icon: "⚙️" },
                water_moat: { name: "水堀", cost: { water: 100 }, icon: "🌊" },
                grass_wall: { name: "草の壁", cost: { grass: 50 }, icon: "🌿" },
                wood_wall: { name: "木の壁", cost: { wood: 50 }, icon: "🧱" },
                torch: { name: "松明", cost: { wood: 10, stone: 5 }, icon: "🔥" },
                stone_wall: { name: "石の壁", cost: { stone: 100 }, icon: "⛰️" },
                stone_tower: { name: "石の監視棟", cost: { stone: 200, wood: 50 }, icon: "🗼" },
                copper_tower: { name: "銅の監視棟", cost: { copper: 150, stone: 100 }, icon: "🔶" },
                copper_archer: { name: "銅の弓兵", cost: { copper: 200, wood: 100 }, icon: "🏹" },
                iron_tower: { name: "鉄の監視棟", cost: { iron: 150, stone: 150 }, icon: "🟨" },
                iron_spearman: { name: "鉄の槍兵", cost: { iron: 200 }, icon: "⚔️" },
                iron_artillery: { name: "鉄の砲兵", cost: { iron: 500, stone: 200 }, icon: "💣" },
                silver_ornament: { name: "銀の装飾", cost: { silver: 300 }, icon: "🥈" },
                gold_ornament: { name: "金の装飾", cost: { gold: 300 }, icon: "🥇" },
                titanium_tower: { name: "未来の防衛棟", cost: { titanium: 500, iron: 500 }, icon: "🚀" }
            },
            goals: [
                { desc: "水堀を作ろう", check: () => state.buildings.water_moat > 0, bg: "bg-blue-900" },
                { desc: "木と石の防衛を揃えよう", check: () => state.buildings.wood_wall > 0 && state.buildings.stone_wall > 0, bg: "bg-green-900" },
                { desc: "鉄の軍隊を結成しよう", check: () => state.buildings.iron_artillery > 0, bg: "bg-red-900" },
                { desc: "未来の城へ進化", check: () => state.buildings.titanium_tower > 0, bg: "bg-purple-900" }
            ]
        };

        function mine(type) {
            state.resources[type] += 1;
            render();
        }

        function craft(id) {
            const b = config.buildings[id];
            for (let res in b.cost) {
                if (state.resources[res] < b.cost[res]) return alert("材料が足りません");
            }
            for (let res in b.cost) state.resources[res] -= b.cost[res];
            state.buildings[id] = (state.buildings[id] || 0) + 1;
            render();
        }

        function showTab(id) {
            document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + id).classList.remove('hidden');
            document.getElementById('tab-' + id).classList.add('active');
        }

        function render() {
            // Stats
            const bar = document.getElementById('stats-bar');
            bar.innerHTML = Object.keys(state.resources).map(k => `
                <div class="bg-zinc-700 p-1 rounded text-center">
                    <div class="text-xl">${config.resources[k].icon}</div>
                    <div class="font-bold">${state.resources[k]}</div>
                </div>
            `).join('');

            // Mine View
            document.getElementById('view-mine').innerHTML = `
                <p class="text-sm text-zinc-400">採掘機: ${state.excavators}台稼働中</p>
                <div class="grid grid-cols-2 gap-2">
                    ${Object.keys(config.resources).map(k => `
                        <button onclick="mine('${k}')" class="resource-card p-4 bg-zinc-800 rounded-xl border border-zinc-600">
                            ${config.resources[k].icon} ${config.resources[k].name}
                        </button>
                    `).join('')}
                </div>
            `;

            // Build View
            document.getElementById('view-build').innerHTML = Object.keys(config.buildings).map(k => {
                const b = config.buildings[k];
                const costStr = Object.keys(b.cost).map(r => `${b.cost[r]}${config.resources[r].icon}`).join(' ');
                return `
                    <div class="p-3 bg-zinc-800 rounded-xl flex justify-between items-center border border-zinc-700">
                        <div>
                            <div class="font-bold">${b.icon} ${b.name}</div>
                            <div class="text-xs text-zinc-400">コスト: ${costStr}</div>
                        </div>
                        <button onclick="craft('${k}')" class="bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold">建築</button>
                    </div>
                `;
            }).join('');

            // Castle View
            const inv = document.getElementById('castle-inventory');
            inv.innerHTML = Object.keys(state.buildings).filter(k => state.buildings[k] > 0).map(k => `
                <div class="p-2 bg-zinc-800 text-center rounded text-sm">${config.buildings[k].icon} x${state.buildings[k]}</div>
            `).join('');

            // Goals
            document.getElementById('view-goals').innerHTML = config.goals.map((g, i) => `
                <div class="p-4 rounded-xl ${g.check() ? 'bg-emerald-900' : 'bg-zinc-800'} border border-zinc-700">
                    ${g.desc} ${g.check() ? '✅' : '⏳'}
                </div>
            `).join('');
            
            // Background Update
            let tier = 0;
            config.goals.forEach(g => { if(g.check()) tier++; });
            const bg = document.getElementById('castle-display');
            bg.className = "w-full h-64 border-4 border-zinc-700 rounded-2xl flex flex-col items-center justify-center p-4 castle-bg " + (tier > 0 ? (tier > 2 ? 'bg-purple-800' : 'bg-zinc-700') : 'bg-zinc-800');
            document.getElementById('castle-status').innerText = `建設ランク: ${tier} / ${config.goals.length}`;
        }

        setInterval(() => {
            state.excavators = state.buildings.excavator || 0;
            if (state.excavators > 0) {
                Object.keys(state.resources).forEach(r => state.resources[r] += Math.floor(state.excavators / 2));
                render();
            }
        }, 3000);

        window.onload = render;
    </script>
</body>
</html>
