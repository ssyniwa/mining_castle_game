<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城塞クラフト・放置採掘ゲーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Helvetica Neue', Arial, sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: #1e293b; border-radius: 12px; padding: 16px; margin: 8px 0; border: 1px solid #334155; }
        .castle-area { transition: all 0.5s ease; min-height: 250px; background: #334155; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        .btn-action { background: #3b82f6; color: white; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; }
        .btn-action:active { transform: scale(0.97); }
        .facility-block { 
            display: inline-flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; margin: 4px; border-radius: 8px; 
            background: #475569; border-bottom: 4px solid #1e293b; font-size: 1.5rem; 
        }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <div id="castle-area" class="castle-area text-center shadow-2xl">
        <h1 id="castle-title" class="text-3xl font-bold mt-2 text-white">小さな開拓地</h1>
        <p id="castle-desc" class="text-sm text-slate-400 mb-4">施設を建設して城を大きくしよう</p>
        <div id="facility-display" class="flex flex-wrap justify-center gap-1 mt-2"></div>
    </div>

    <div class="mt-6 grid grid-cols-3 gap-2" id="resource-display"></div>

    <div class="flex gap-2 mt-6 overflow-x-auto pb-2 border-b border-slate-700">
        <button onclick="showTab('mine')" class="px-4 py-2 bg-blue-900 rounded-lg text-sm">採掘</button>
        <button onclick="showTab('build')" class="px-4 py-2 bg-green-900 rounded-lg text-sm">建築</button>
        <button onclick="showTab('goals')" class="px-4 py-2 bg-yellow-900 rounded-lg text-sm">目標</button>
    </div>

    <div id="mine" class="tab-content active mt-4">
        <h2 class="text-xl font-bold mb-3">素材採掘</h2>
        <div id="mining-nodes" class="grid grid-cols-1 gap-2"></div>
    </div>

    <div id="build" class="tab-content mt-4">
        <h2 class="text-xl font-bold mb-3">施設・部隊建築</h2>
        <div id="build-list" class="space-y-2"></div>
    </div>

    <div id="goals" class="tab-content mt-4">
        <h2 class="text-xl font-bold mb-3">達成目標</h2>
        <div id="goal-list" class="space-y-2"></div>
    </div>

    <script>
        const state = {
            res: { water: 0, grass: 0, wood: 0, stone: 0, copper: 0, iron: 0, silver: 0, gold: 0, titanium: 0 },
            excavators: { water: 0, grass: 0, wood: 0, stone: 0, copper: 0, iron: 0, silver: 0, gold: 0, titanium: 0 },
            buildings: [],
            goals: [
                { id: 1, title: "開拓者", desc: "木材を20個集める", check: () => state.res.wood >= 20, done: false },
                { id: 2, title: "城壁建築", desc: "木の壁を1つ建てる", check: () => state.buildings.includes("woodWall"), done: false },
                { id: 3, title: "鉄壁の防衛", desc: "鉄の監視棟を1つ建てる", check: () => state.buildings.includes("ironWatch"), done: false },
                { id: 4, title: "黄金の都", desc: "金の装飾棟を1つ建てる", check: () => state.buildings.includes("goldOrnament"), done: false }
            ]
        };

        const recipes = {
            waterMoat: { name: "水堀", cost: { water: 50 }, icon: "💧" },
            grassWall: { name: "草の壁", cost: { grass: 20 }, icon: "🌿" },
            woodWall: { name: "木の壁", cost: { wood: 50 }, icon: "🪵" },
            torch: { name: "松明", cost: { wood: 10 }, icon: "🔥" },
            stoneWall: { name: "石の壁", cost: { stone: 50 }, icon: "🧱" },
            stoneWatch: { name: "石の監視棟", cost: { stone: 100 }, icon: "🏰" },
            copperWatch: { name: "銅の監視棟", cost: { copper: 50 }, icon: "🥉" },
            copperArcher: { name: "銅の弓兵", cost: { copper: 80 }, icon: "🏹" },
            ironWatch: { name: "鉄の監視棟", cost: { iron: 100 }, icon: "🛡️" },
            ironSpear: { name: "鉄の槍兵", cost: { iron: 80 }, icon: "⚔️" },
            ironArtillery: { name: "鉄の砲兵", cost: { iron: 200 }, icon: "💣" },
            silverOrnament: { name: "銀の装飾棟", cost: { silver: 500 }, icon: "🥈" },
            goldOrnament: { name: "金の装飾棟", cost: { gold: 500 }, icon: "👑" },
            futureDef: { name: "未来の防衛棟", cost: { titanium: 1000 }, icon: "🚀" }
        };

        function render() {
            document.getElementById('resource-display').innerHTML = Object.keys(state.res).map(key => 
                `<div class="card p-2 text-center text-xs">
                    <div class="text-slate-400">${key.toUpperCase()}</div>
                    <div class="font-bold text-lg">${Math.floor(state.res[key])}</div>
                </div>`
            ).join('');

            document.getElementById('mining-nodes').innerHTML = Object.keys(state.res).map(key => 
                `<div class="flex gap-2 items-center bg-slate-800 p-2 rounded">
                    <button onclick="mine('${key}')" class="flex-1 text-left p-2">採掘: ${key}</button>
                    <button onclick="buyExcavator('${key}')" class="bg-purple-900 px-3 py-2 rounded text-xs">掘削機 (${state.excavators[key]})</button>
                </div>`
            ).join('');

            document.getElementById('build-list').innerHTML = Object.keys(recipes).map(key => 
                `<div class="card flex justify-between items-center">
                    <div>
                        <div class="font-bold">${recipes[key].icon} ${recipes[key].name}</div>
                        <div class="text-xs text-slate-400">Cost: ${Object.entries(recipes[key].cost).map(e=>e[1]+e[0]).join(', ')}</div>
                    </div>
                    <button onclick="build('${key}')" class="bg-green-700 px-4 py-2 rounded font-bold">建設</button>
                </div>`
            ).join('');

            document.getElementById('facility-display').innerHTML = state.buildings.map(bKey => 
                `<span class="facility-block shadow-lg">${recipes[bKey].icon}</span>`
            ).join('');

            document.getElementById('goal-list').innerHTML = state.goals.map(g => 
                `<div class="card ${g.done ? 'bg-green-900 border-green-700' : 'bg-slate-800'} text-sm">
                    <div class="font-bold">${g.title}</div>
                    <div class="text-slate-300">${g.desc}</div>
                </div>`
            ).join('');

            checkGoals();
        }

        function mine(res) { state.res[res] += 1; render(); }
        
        function buyExcavator(res) {
            const cost = 50;
            if (state.res[res] >= cost) {
                state.res[res] -= cost;
                state.excavators[res] += 1;
                render();
            }
        }

        function build(key) {
            const recipe = recipes[key];
            for (let r in recipe.cost) if (state.res[r] < recipe.cost[r]) return;
            for (let r in recipe.cost) state.res[r] -= recipe.cost[r];
            state.buildings.push(key);
            render();
        }

        function checkGoals() {
            state.goals.forEach(g => { if (!g.done && g.check()) { g.done = true; updateVisual(); } });
        }

        function updateVisual() {
            const count = state.goals.filter(g => g.done).length;
            const el = document.getElementById('castle-area');
            const title = document.getElementById('castle-title');
            if (count >= 3) { el.style.background = "#854d0e"; title.innerText = "伝説の黄金城"; }
            else if (count >= 1) { el.style.background = "#334155"; title.innerText = "要塞都市"; }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        setInterval(() => {
            Object.keys(state.excavators).forEach(r => state.res[r] += state.excavators[r] * 0.2);
            render();
        }, 1000);

        render();
    </script>
</body>
</html>
