<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Builder</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: #e0e0e0; margin: 0; padding: 10px; }
        .tab-content { display: none; padding: 10px; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 15px; border: none; border-radius: 8px; background: #4e4e6a; color: white; }
        button:disabled { background: #333; opacity: 0.6; }
        .stats { background: #16213e; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="stats" id="stats">
    <!-- 素材表示エリア -->
    <div id="material-list"></div>
</div>

<nav>
    <button onclick="showTab('mine')">採掘</button>
    <button onclick="showTab('build')">建築</button>
</nav>

<div id="mine" class="tab-content active">
    <h3>採掘場</h3>
    <button onclick="mine('wood')">木材を伐採</button>
    <button onclick="mine('stone')">石材を掘る</button>
    <button onclick="mine('iron')">鉄鉱石を掘る</button>
</div>

<div id="build" class="tab-content">
    <h3>工房・建築</h3>
    <div class="grid">
        <button onclick="build('wooden_wall')">木の壁 (木材x5)</button>
        <button onclick="build('stone_tower')">石の監視棟 (石材x5, 鉄x2)</button>
    </div>
</div>

<script>
    const state = {
        materials: { wood: 0, stone: 0, iron: 0 },
        buildings: { wooden_wall: 0, stone_tower: 0 }
    };

    function mine(type) {
        state.materials[type]++;
        updateUI();
    }

    function build(item) {
        const costs = {
            wooden_wall: { wood: 5 },
            stone_tower: { stone: 5, iron: 2 }
        };

        // コスト確認
        for (let mat in costs[item]) {
            if (state.materials[mat] < costs[item][mat]) {
                alert("材料が足りません！");
                return;
            }
        }

        // 消費
        for (let mat in costs[item]) {
            state.materials[mat] -= costs[item][mat];
        }
        state.buildings[item]++;
        alert(item + " を建設しました！");
        updateUI();
    }

    function updateUI() {
        // 素材表示の更新
        let html = "素材: ";
        for (let m in state.materials) {
            html += `${m}:${state.materials[m]} `;
        }
        document.getElementById('material-list').innerHTML = html;
    }

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(tabId).style.display = 'block';
    }

    updateUI();
</script>
</body>
</html>
